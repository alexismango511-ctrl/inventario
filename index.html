<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuenStock Pro - Administrador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #login-screen { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; margin-top: 50px; }
        #main-content { display: none; width: 100%; max-width: 900px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* FORMULARIO */
        .form-registro { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .form-registro input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        .btn-add { background: #059669; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add:hover { background: #047857; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #2563eb; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        
        .low-stock { color: #dc2626; font-weight: bold; background: #fee2e2; padding: 3px 6px; border-radius: 4px; }
        .total-card { margin-top: 20px; background: #2563eb; color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { color: #ef4444; cursor: pointer; border: none; background: none; font-size: 18px; }
        
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-login { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <i class="fas fa-user-shield" style="font-size: 40px; color: #2563eb; margin-bottom: 15px;"></i>
        <h2>BuenStock</h2>
        <input type="password" id="accessKey" placeholder="Clave: 1234">
        <button class="btn-login" onclick="checkKey()">Entrar</button>
    </div>

    <div id="main-content">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h2 style="margin:0"><i class="fas fa-store"></i> Panel de Control</h2>
            <button onclick="location.reload()" style="border:none; background:#f1f5f9; padding:8px 15px; border-radius:8px; cursor:pointer">Salir</button>
        </div>

        <div class="form-registro">
            <input type="text" id="prodNombre" placeholder="Nombre del producto">
            <input type="number" id="prodStock" placeholder="Cant.">
            <input type="number" id="prodPrecio" placeholder="Precio $">
            <button class="btn-add" onclick="agregarProducto()"><i class="fas fa-plus"></i> Añadir</button>
        </div>

        <table id="tablaInventario">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Stock</th>
                    <th>Precio</th>
                    <th>Subtotal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <div class="total-card">
            <span>VALOR TOTAL EN MERCANCÍA</span>
            <span id="granTotal" style="font-size: 24px; font-weight: bold;">$0.00</span>
        </div>
    </div>

    <script>
        function checkKey() {
            if (document.getElementById('accessKey').value === "1234") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert("Error"); }
        }

        function agregarProducto() {
            const nombre = document.getElementById('prodNombre').value;
            const stock = parseInt(document.getElementById('prodStock').value);
            const precio = parseFloat(document.getElementById('prodPrecio').value);

            if (nombre && stock >= 0 && precio >= 0) {
                const tabla = document.getElementById('tablaInventario').getElementsByTagName('tbody')[0];
                const nuevaFila = tabla.insertRow();
                
                const subtotal = stock * precio;
                
                // Si el stock es bajo, le ponemos la advertencia
                const stockVisual = stock < 10 ? `<span class="low-stock"><i class="fas fa-exclamation-triangle"></i> ${stock}</span>` : stock;

                nuevaFila.innerHTML = `
                    <td>${nombre}</td>
                    <td>${stockVisual}</td>
                    <td>$${precio.toFixed(2)}</td>
                    <td>$${subtotal.toFixed(2)}</td>
                    <td><button class="btn-delete" onclick="borrarFila(this)"><i class="fas fa-trash"></i></button></td>
                `;

                actualizarTotal();
                // Limpiar los cuadritos después de agregar
                document.getElementById('prodNombre').value = "";
                document.getElementById('prodStock').value = "";
                document.getElementById('prodPrecio').value = "";
            } else {
                alert("Por favor llena todos los campos con números válidos");
            }
        }

        function borrarFila(boton) {
            if(confirm("¿Borrar este producto?")) {
                boton.parentElement.parentElement.remove();
                actualizarTotal();
            }
        }

        function actualizarTotal() {
            let total = 0;
            const tabla = document.getElementById('tablaInventario');
            for (let i = 1; i < tabla.rows.length; i++) {
                let sub = tabla.rows[i].cells[3].innerText.replace('$', '');
                total += parseFloat(sub);
            }
            document.getElementById('granTotal').innerText = "$" + total.toFixed(2);
        }
    </script>
</body>
</html>
