<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuenStock Pro - Control de Inventario</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #login-screen { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 320px; text-align: center; margin-top: 50px; }
        #main-content { display: none; width: 100%; max-width: 900px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .form-registro { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .form-registro input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        .btn-add { background: #059669; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #2563eb; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        
        .low-stock { color: #dc2626; font-weight: bold; background: #fee2e2; padding: 3px 6px; border-radius: 4px; }
        .total-card { margin-top: 20px; background: #2563eb; color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { color: #ef4444; cursor: pointer; border: none; background: none; font-size: 18px; }
        
        input[type="password"] { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-login { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-clear { background: #64748b; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <i class="fas fa-user-shield" style="font-size: 40px; color: #2563eb; margin-bottom: 15px;"></i>
        <h2>BuenStock</h2>
        <input type="password" id="accessKey" placeholder="Clave: 1234">
        <button class="btn-login" onclick="checkKey()">Entrar</button>
    </div>

    <div id="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0"><i class="fas fa-store"></i> Panel Bs.</h2>
            <button onclick="borrarTodo()" class="btn-clear"><i class="fas fa-eraser"></i> Limpiar Todo</button>
        </div>

        <div class="form-registro">
            <input type="text" id="prodNombre" placeholder="Producto">
            <input type="number" id="prodStock" placeholder="Cant.">
            <input type="number" id="prodPrecio" placeholder="Precio Bs.">
            <button class="btn-add" onclick="agregarProducto()">+ Añadir</button>
        </div>

        <table id="tablaInventario">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Stock</th>
                    <th>Precio</th>
                    <th>Subtotal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div class="total-card">
            <span>TOTAL EN MERCANCÍA</span>
            <span id="granTotal" style="font-size: 24px; font-weight: bold;">Bs. 0.00</span>
        </div>
    </div>

    <script>
        // 1. Cargar datos al abrir la página
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('productos')) {
                renderizarTabla();
            }
        });

        function checkKey() {
            if (document.getElementById('accessKey').value === "1234") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert("Clave incorrecta"); }
        }

        function agregarProducto() {
            const nombre = document.getElementById('prodNombre').value;
            const stock = parseInt(document.getElementById('prodStock').value);
            const precio = parseFloat(document.getElementById('prodPrecio').value);

            if (nombre && !isNaN(stock) && !isNaN(precio)) {
                const nuevoProd = { nombre, stock, precio };
                
                // Guardar en el arreglo de LocalStorage
                let productos = JSON.parse(localStorage.getItem('productos') || "[]");
                productos.push(nuevoProd);
                localStorage.setItem('productos', JSON.stringify(productos));

                renderizarTabla();
                
                document.getElementById('prodNombre').value = "";
                document.getElementById('prodStock').value = "";
                document.getElementById('prodPrecio').value = "";
            } else {
                alert("Completa los datos correctamente");
            }
        }

        function renderizarTabla() {
            const tbody = document.querySelector('#tablaInventario tbody');
            tbody.innerHTML = "";
            let productos = JSON.parse(localStorage.getItem('productos') || "[]");
            let totalGeneral = 0;

            productos.forEach((p, index) => {
                const subtotal = p.stock * p.precio;
                totalGeneral += subtotal;
                const row = tbody.insertRow();
                const stockClase = p.stock < 10 ? 'class="low-stock"' : '';

                row.innerHTML = `
                    <td>${p.nombre}</td>
                    <td ${stockClase}>${p.stock}</td>
                    <td>Bs. ${p.precio.toLocaleString('es-VE')}</td>
                    <td>Bs. ${subtotal.toLocaleString('es-VE')}</td>
                    <td><button class="btn-delete" onclick="borrarFila(${index})"><i class="fas fa-trash"></i></button></td>
                `;
            });

            document.getElementById('granTotal').innerText = "Bs. " + totalGeneral.toLocaleString('es-VE', {minimumFractionDigits: 2});
        }

        function borrarFila(index) {
            let productos = JSON.parse(localStorage.getItem('productos'));
            productos.splice(index, 1);
            localStorage.setItem('productos', JSON.stringify(productos));
            renderizarTabla();
        }

        function borrarTodo() {
            if(confirm("¿Seguro que quieres borrar todo el inventario?")) {
                localStorage.removeItem('productos');
                renderizarTabla();
            }
        }
    </script>
</body>
</html>
